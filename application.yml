springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

eureka:
  instance:
    prefer-ip-address: true

spring:
  jpa:
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
