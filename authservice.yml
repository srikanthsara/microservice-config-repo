server:
  port: 8766

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

info:
  app:
    name: Auth Service

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
