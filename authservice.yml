server:
  port: 8766

spring:

  datasource:
    url: ${AUTH_DB_URL}
    username: ${AUTH_DB_USER}
    password: ${AUTH_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    locations: classpath:db/migration

info:
  app:
    name: Auth Service
    description: Production Ready Auth Service

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}