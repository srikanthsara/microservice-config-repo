server:
  port: 8763

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/cart_db
    username: cart_user
    password: cart_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/
